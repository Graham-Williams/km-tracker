<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Cup — KM Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; padding: 1rem; max-width: 480px; margin: 0 auto; }
        h1 { margin-bottom: 1rem; }
        .flash { background: #fee; color: #900; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; }
        .edit-form { display: flex; flex-direction: column; gap: 0.75rem; }
        .edit-form label { font-weight: 600; }
        .edit-form input[type="datetime-local"] { padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        .edit-form textarea { width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        .edit-form .buttons { display: flex; gap: 0.5rem; }
        .edit-form button, .edit-form a {
            padding: 0.5rem 1rem; font-size: 1rem; border-radius: 4px;
            text-decoration: none; border: 1px solid #ccc; background: #f8f8f8; color: #333; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Edit Cup</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="flash">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form class="edit-form" method="post" action="{{ url_for('update_cup', cup_id=cup.id) }}">
        <label for="cup-date">Date</label>
        <input type="datetime-local" name="date" id="cup-date" required>
        <label for="cup-notes">Notes</label>
        <textarea name="notes" id="cup-notes" rows="3">{{ cup.notes or '' }}</textarea>
        <input type="hidden" name="tz_offset" id="tz-offset">
        <div class="buttons">
            <button type="submit">Save</button>
            <a href="{{ url_for('cups') }}">Cancel</a>
        </div>
    </form>

    <script>
        // Set timezone offset
        document.getElementById("tz-offset").value = new Date().getTimezoneOffset();

        // Convert stored UTC datetime to local for the input
        var utcStr = "{{ cup.date }}";
        var d = new Date(utcStr.replace(" ", "T") + "Z");
        if (!isNaN(d)) {
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            document.getElementById("cup-date").value = d.toISOString().slice(0, 16);
        }
    </script>
</body>
</html>
